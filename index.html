// ── INIT ──
function init() {
  // Load user edits from main CRM localStorage
  let userEdits = {};
  try {
    const s = localStorage.getItem(STORED_KEY);
    if (s) { const p = JSON.parse(s); p.forEach(l => { userEdits[l._id] = l; }); }
  } catch(e) {}

  leads = LEADS_DATA.map(l => {
    const u = userEdits[l._id] || {};
    return { ...l, stav: u.stav || l.stav, followup: u.followup || '', myNotes: u.myNotes || '',
             prodej_castka: u.prodej_castka || '', prodej_produkt: u.prodej_produkt || '' };
  });

  // Load cached draft map from previous sync
  try {
    const ds = localStorage.getItem(SLIM_KEY);
    if (ds) {
      const cached = JSON.parse(ds);
      draftMap = cached.map || {};
      synced = true;
      document.getElementById('syncStatus').textContent = 'Naposledy: ' + (cached.time || '?');
    }
  } catch(e) {}

  renderStats();
  renderContent();
}

// ── SYNC ──
async function doSync() {
  const btn = document.getElementById('syncBtn');
  const icon = document.getElementById('syncIcon');
  btn.disabled = true;
  icon.innerHTML = '<span class="spinner"></span>';
  document.getElementById('syncStatus').textContent = 'Načítám drafty…';

  try {
    const allDrafts = [];
    let pageToken = '';
    let page = 0;
    do {
      const args = { pageSize: 50, view: 'DRAFT_VIEW_FULL' };
      if (pageToken) args.pageToken = pageToken;
      const r = await window.cowork.callMcpTool(
        'mcp__10e3268c-06b9-4a9e-9e5c-89490496ccbb__list_drafts', args
      );
      const data = r.structuredContent ?? JSON.parse(r.content[0].text);
      if (data.drafts) allDrafts.push(...data.drafts);
      pageToken = data.nextPageToken || '';
      page++;
      if (page > 10) break; // safety
    } while (pageToken);

    // Build email → draft map
    draftMap = {};
    allDrafts.forEach(d => {
      (d.toRecipients || []).forEach(email => {
        draftMap[email.toLowerCase().trim()] = {
          id: d.id, subject: d.subject, date: d.date
        };
      });
    });

    synced = true;
    const now = new Date().toLocaleTimeString('cs', {hour:'2-digit',minute:'2-digit'});
    document.getElementById('syncStatus').textContent = `✅ ${allDrafts.length} draftů · ${now}`;

    // Cache
    try {
      localStorage.setItem(SLIM_KEY, JSON.stringify({ map: draftMap, time: now, count: allDrafts.length }));
    } catch(e) {}

    renderStats();
    renderContent();
  } catch(e) {
    document.getElementById('syncStatus').textContent = '❌ Chyba: ' + e.message;
  }

  icon.textContent = '🔄';
  btn.disabled = false;
}

// ── TABS ──
function setTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['volat','drafts'][i]===t));
  renderContent();
}

// ── STATS ──
function renderStats() {
  const today = new Date().toISOString().slice(0,10);
  const volatL = leads.filter(l=>l.stav==='volat');
  const emailR = leads.filter(l=>l.stav==='email_ready');
  const fuOv   = leads.filter(l=>l.followup&&l.followup<today);
  const fuTd   = leads.filter(l=>l.followup===today);
  const fuUp   = leads.filter(l=>l.followup>today);
  const hasDraft = leads.filter(l=>l.email&&draftMap[l.email.toLowerCase()]);
  const draftCount = Object.keys(draftMap).length;

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip"><span class="num c-orange">${volatL.length}</span><span>Naplánováno volat</span></div>
    <div class="stat-chip"><span class="num c-purple">${emailR.length}</span><span>Odeslat email</span></div>
    <div class="stat-chip"><span class="num c-red">${fuOv.length}</span><span>Prošlé follow-upy</span></div>
    <div class="stat-chip"><span class="num c-green">${fuTd.length}</span><span>Follow-up dnes</span></div>
    ${synced ? `<div class="stat-chip"><span class="num c-green">${hasDraft.length}</span><span>Leadů s draftem</span></div>
    <div class="stat-chip"><span class="num c-gray">${draftCount}</span><span>Draftů celkem v Gmailu</span></div>` : ''}
  `;
}

// ── CONTENT ──
function renderContent() {
  if (currentTab === 'volat') renderVolat();
  else renderAllDrafts();
}

function hasDraftFor(email) {
  if (!email || !synced) return null;
  return draftMap[email.toLowerCase().trim()] || null;
}

function card(l, dateLabel, dateColor) {
  const draft = hasDraftFor(l.email);
  const tel = (l.telefon||'').replace(/[^+0-9]/g,'');
  const draftBadge = synced
    ? (draft
        ? `<span class="badge badge-draft">✉️ Draft připraven</span>`
        : `<span class="badge badge-nodraft">⚠️ Bez draftu</span>`)
    : '';
  const slBadge = l.sluzba && SLUZBA[l.sluzba] ? `<span class="badge badge-sluzba">${SLUZBA[l.sluzba]}</span>` : '';
  const locBadge = l.lokace ? `<span class="badge badge-lokace">📍 ${esc(l.lokace)}</span>` : '';
  return `<div class="card">
    <div class="card-date" style="color:${dateColor}">${dateLabel}</div>
    <div class="card-info">
      <div class="card-name">${esc(l.jmeno||'')}${l.firma?' · <span style="font-weight:400;color:#64748b">'+esc(l.firma)+'</span>':''}</div>
      <div class="card-sub">${esc(l.poznamka||l.problem||'')}${l.lokace?' · 📍'+esc(l.lokace):''}</div>
      <div class="card-badges">${draftBadge}${slBadge}</div>
    </div>
    <div class="card-actions">
      ${tel?`<a class="btn-ic" href="tel:${tel}">📞 Volat</a>`:''}
      ${l.email?`<a class="btn-ic" href="mailto:${esc(l.email)}">✉️</a>`:''}
      ${draft?`<a class="btn-ic green" href="https://mail.google.com/mail/u/0/#drafts/${draft.id}" target="_blank">📨 Otevřít draft</a>`:''}
    </div>
  </div>`;
}

function renderVolat() {
  const today = new Date().toISOString().slice(0,10);
  const q = searchQ.toLowerCase();

  function flt(arr) {
    if (!q) return arr;
    return arr.filter(l => (l.jmeno||'').toLowerCase().includes(q)||(l.firma||'').toLowerCase().includes(q)||(l.email||'').toLowerCase().includes(q)||(l.telefon||'').includes(q));
  }

  const emailReady = flt(leads.filter(l=>l.stav==='email_ready'));
  const volatL     = flt(leads.filter(l=>l.stav==='volat')).sort((a,b)=>(a.volat_date||'zzz').localeCompare(b.volat_date||'zzz'));
  const fuOv       = flt(leads.filter(l=>l.followup&&l.followup<today)).sort((a,b)=>a.followup.localeCompare(b.followup));
  const fuTd       = flt(leads.filter(l=>l.followup===today));
  const fuUp       = flt(leads.filter(l=>l.followup>today)).sort((a,b)=>a.followup.localeCompare(b.followup));

  const sec = (title, arr, color) => {
    if (!arr.length) return '';
    // Split: s draftem / bez draftu
    const wDraft  = arr.filter(l=>hasDraftFor(l.email));
    const noDraft = arr.filter(l=>!hasDraftFor(l.email));
    const displayArr = synced ? [...wDraft, ...noDraft] : arr;
    return `<div class="section">
      <div class="section-title" style="color:${color}">${title} <span class="section-count">${arr.length}</span>
        ${synced&&wDraft.length?`<span style="background:#dcfce7;color:#15803d;border-radius:8px;padding:1px 8px;font-size:.68rem">✉️ ${wDraft.length} s draftem</span>`:''}
      </div>
      ${displayArr.map(l => card(l, l.volat_date||l.followup||'📧', color)).join('')}
    </div>`;
  };

  let h = `<div class="search-bar"><input type="text" placeholder="🔍 Hledat…" oninput="searchQ=this.value;renderContent()" value="${esc(searchQ)}"></div>`;
  if (!synced) h += `<div style="background:#fef9c3;border:1px solid #fde68a;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:.82rem;color:#78350f">⚠️ Klikni <strong>Synchronizovat Gmail</strong> nahoře — zjistíme, které leady mají připravený draft.</div>`;

  h += sec('📧 Odeslat email', emailReady, '#7c3aed');
  h += sec('📞 Naplánovaná volání', volatL, '#f97316');
  h += sec('⚠️ Prošlé follow-upy', fuOv, '#dc2626');
  h += sec('✅ Follow-up dnes', fuTd, '#16a34a');
  h += sec('📅 Nadcházející follow-upy', fuUp, '#3b82f6');

  if (!emailReady.length && !volatL.length && !fuOv.length && !fuTd.length && !fuUp.length)
    h += `<div class="empty">Žádné naplánované aktivity.</div>`;

  document.getElementById('contentArea').innerHTML = h;
}

function renderAllDrafts() {
  if (!synced) {
    document.getElementById('contentArea').innerHTML = `<div class="empty">Nejdřív klikni <strong>Synchronizovat Gmail</strong> nahoře.</div>`;
    return;
  }
  const entries = Object.entries(draftMap);
  const q = searchQ.toLowerCase();
  const flt = q ? entries.filter(([e])=>e.includes(q)) : entries;
  // Cross-ref with leads
  const leadMap = {};
  leads.forEach(l => { if(l.email) leadMap[l.email.toLowerCase().trim()] = l; });

  let h = `<div class="search-bar"><input type="text" placeholder="🔍 Hledat email…" oninput="searchQ=this.value;renderContent()" value="${esc(searchQ)}"></div>`;
  h += `<div class="section"><div class="section-title">✉️ Drafty v Gmailu <span class="section-count">${entries.length}</span></div>
  <table class="draft-table"><thead><tr>
    <th>Email</th><th>Lead</th><th>Shoda</th><th>Předmět draftu</th><th>Datum</th><th>Akce</th>
  </tr></thead><tbody>`;

  flt.sort((a,b)=>{
    const la = leadMap[a[0]], lb = leadMap[b[0]];
    return (lb?1:0)-(la?1:0);
  }).forEach(([email, draft]) => {
    const lead = leadMap[email];
    h += `<tr>
      <td class="draft-email">${esc(email)}</td>
      <td>${lead?`<div class="draft-name">${esc(lead.jmeno)}</div><div style="font-size:.72rem;color:#64748b">${esc(lead.firma||'')}</div>`:'<span style="color:#94a3b8">Nenalezen</span>'}</td>
      <td>${lead?`<span class="match-yes">✅ Ano</span>`:`<span class="match-no">—</span>`}</td>
      <td style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#475569">${esc(draft.subject||'')}</td>
      <td class="draft-date">${draft.date ? new Date(draft.date).toLocaleDateString('cs') : '—'}</td>
      <td><a class="btn-ic" href="https://mail.google.com/mail/u/0/#drafts/${draft.id}" target="_blank">📨 Otevřít</a>${lead&&lead.telefon?`<a class="btn-ic" href="tel:${lead.telefon.replace(/[^+0-9]/g,'')}">📞</a>`:''}</td>
    </tr>`;
  });
  h += '</tbody></table></div>';
  document.getElementById('contentArea').innerHTML = h;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

init();
</script>
</body>
</html>
